<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kettlewick</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #1a0e04;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        overflow: hidden;
      }
      #game-wrapper {
        position: relative;
        width: 360px;
        height: 640px;
      }
      /* Background renders as a native HTML img — always sharp */
      #scene-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
      }
      /* Phaser canvas sits on top, transparent background */
      #game-container {
        position: absolute;
        inset: 0;
        z-index: 1;
      }
      #game-container canvas {
        background: transparent !important;
      }

      /* Scale the whole wrapper to fit the viewport */
      @media (max-height: 640px) {
        #game-wrapper {
          transform: scale(calc(100vh / 640px));
          transform-origin: center center;
        }
      }
    </style>
  </head>
  <body>
    <div id="game-wrapper">
      <img id="scene-bg" src="assets/backgrounds/shop_bg.png" alt="" />
      <div id="game-container"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
